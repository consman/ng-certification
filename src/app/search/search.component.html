<div class="well">
  <h2>Enter a zipcode:</h2>
  <input class="form-control" placeholder="Zipcode" type="text" id="addLocation" [(ngModel)]="newZip" />
  <br>
  <button (click)="search()" class="btn btn-primary" id="addLocationBtn">
    Add location
  </button>

    <p *ngFor="let loc of locations">
      <app-location [location]="loc" [locations]="locations"></app-location>
    </p>

</div>
